name: Patent Scraper (Lens.org)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run scraper
        run: python patent_scraper.py
        env:
          LENS_API_KEY: ${{ secrets.LENS_API_KEY }}

      - name: Upload patent data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: patent-data-run${{ github.run_number }}
          path: |
            patent_data/
            checkpoint.json
          retention-days: 90

      - name: Commit checkpoint
        if: always()
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add checkpoint.json
          git diff --staged --quiet && echo "no change" || \
            (git commit -m "checkpoint: run ${{ github.run_number }}" && git push)
